{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

    <h1>{{ post.title }}</h1>

    <!-- date filter — formats the date nicely -->
    <!-- filters use the pipe character | -->
    <!-- Express equivalent: moment(date).format('...') -->
    <small>Posted on {{ post.created_at|date:"F j, Y" }}</small>

    <p>{{ post.content }}</p>

    <!-- linebreaks filter converts \n newlines to <br> or <p> tags -->
    <!-- useful for multi-line text content -->
    <p>{{ post.content|linebreaks }}</p>

    <a href="{% url 'get-all-posts' %}">← Back to all posts</a>

{% endblock %}
