{% extends 'blog/base.html' %}

{% block content %}

    <h1>Delete "{{ post.title }}"?</h1>
    <p>This cannot be undone.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, delete it</button>
        <a href="{% url 'get-all-posts' %}">Cancel</a>
    </form>

{% endblock %}
