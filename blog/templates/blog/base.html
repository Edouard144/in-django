<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Blog{% endblock %}</title>
</head>
<body>

    <!-- This is the navigation, shown on every page -->
    <nav>
        <a href="{% url 'get-all-posts' %}">All Posts</a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'create-post' %}">Create Post</a>
            <a href="{% url 'dashboard' %}">Dashboard ({{ request.user.username }})</a>
            <form method="POST" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <!-- block content is a placeholder -->
    <!-- child templates fill this section with their own content -->
    <!-- Express/EJS equivalent: <%- body %> in a layout file -->
    {% block content %}
    {% endblock %}

</body>
</html>
