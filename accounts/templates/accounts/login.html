{% extends 'blog/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

    <h1>Log In</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>

    <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>

{% endblock %}
